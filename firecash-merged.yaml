# FireCash mining pool — public stratum bridge.
# One shared FireCash node; several stratum ports at different fixed
# difficulties plus an auto (vardiff) port, so any miner picks the right one.
kaspad_address: "127.0.0.1:16120"
block_wait_time: 500
print_stats: true
log_to_file: false
health_check_port: ""
web_dashboard_port: ":3044"
var_diff: false
shares_per_min: 20
var_diff_stats: false
pow2_clamp: true
extranonce_size: 2
coinbase_tag_suffix: "firecash"

instances:
  # Auto — variable difficulty, adapts to the miner (recommended default).
  # Low starting floor so even a modest GPU lands its first share within
  # seconds; vardiff then raises it for stronger hardware.
  - stratum_port: ":5559"
    min_share_diff: 0.05
    prom_port: ":2119"
    var_diff: true
    shares_per_min: 20
    log_to_file: false

  # Low — small GPUs.
